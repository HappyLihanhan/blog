    <link rel="stylesheet" href="./styles.css?v=20260622-stable-scroll" />
  </head>
  <body data-page="about">
    <header class="site-header">
      <a class="brand" href="./index.html" aria-label="回到首页">
        <span class="brand-mark" aria-hidden="true"></span>
        <span class="brand-text">ian's Blog</span>
      </a>
      <nav class="desktop-nav" aria-label="主导航">
        <a href="./index.html">首页</a>
        <a href="./notes.html">学习笔记</a>

        <a href="./resume.html">关于博主</a>

      </nav>
      <div class="header-actions">
        <button class="search-trigger" type="button" data-open-search>
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="m21 21-4.3-4.3m1.3-5.2a6.5 6.5 0 1 1-13 0 6.5 6.5 0 0 1 13 0Z" />
          </svg>
          <span>搜索</span>
          <kbd>Ctrl K</kbd>
        </button>
        <button class="icon-button" type="button" data-theme-toggle aria-label="切换主题">
          <svg class="sun" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 4V2m0 20v-2m8-8h2M2 12h2m14.1 6.1 1.4 1.4M4.5 4.5l1.4 1.4m0 12.2-1.4 1.4M19.5 4.5l-1.4 1.4" />
            <circle cx="12" cy="12" r="4" />
          </svg>
          <svg class="moon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M20.5 15.2A8.4 8.4 0 0 1 8.8 3.5 8.5 8.5 0 1 0 20.5 15.2Z" />
          </svg>
        </button>
        <button class="icon-button menu-button" type="button" data-menu-toggle aria-label="打开菜单">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 7h16M4 12h16M4 17h16" />
          </svg>
        </button>

    </header>

    <div class="mobile-menu" data-mobile-menu>

      <a href="./admin.html" data-local-admin hidden>后台</a>
    </div>

    <main id="home" class="page-shell">
      <section class="about-band" aria-labelledby="about-title">
        <div>
          <p class="eyebrow">About</p>
          <h1 id="about-title">写作原则</h1>
        </div>
        <p>
          文章尽量从“遇到了什么问题”开始，给出最小示例、推导过程、验证方法和可继续阅读的资料。这里不是一次性发布的作品集，而是持续更新的个人知识库。
        </p>
      </section>
    </main>

    <footer class="site-footer">
      <p>© 2026 ian's Blog</p>
      <a href="./index.html">回到首页</a>
    </footer>

    <div class="modal-backdrop" data-search-modal hidden>
      <section class="search-modal" role="dialog" aria-modal="true" aria-labelledby="search-title">
        <div class="search-box">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="m21 21-4.3-4.3m1.3-5.2a6.5 6.5 0 1 1-13 0 6.5 6.5 0 0 1 13 0Z" />
          </svg>
          <input id="site-search" type="search" placeholder="搜索文章、复盘或标签" autocomplete="off" />
          <button type="button" data-close-search aria-label="关闭搜索">Esc</button>
        </div>
        <h2 id="search-title">搜索结果</h2>
        <div class="search-results" data-search-results></div>
      </section>
    </div>

    <div class="modal-backdrop" data-post-modal hidden>
      <article class="post-modal" role="dialog" aria-modal="true" aria-labelledby="post-title">
        <button class="close-post" type="button" data-close-post aria-label="关闭文章">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M18 6 6 18M6 6l12 12" />
          </svg>
        </button>
        <p class="eyebrow" data-post-meta></p>
        <h2 id="post-title" data-post-title></h2>
        <div class="post-body" data-post-body></div>
      </article>
    </div>

    <script src="./script.js?v=20260710-title-sort"></script>
